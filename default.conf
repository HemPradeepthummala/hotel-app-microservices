events {}

http {

    upstream booking-service {
        server booking:8080;
    }

    upstream user-service {
        server auth:8080;
    }

    upstream search-service {
        server search:8080;
    }

    server {

        listen 80;

        location /api/users/ {
            proxy_pass http://user-service/;
        }

        location /api/bookings/ {
            proxy_pass http://booking-service/;
        }

        location /api/search/ {
            proxy_pass http://search-service/;
        }
    }
}