version: "3.9"

services:
  auth:
    build:
      context: ./auth
    restart: always

    depends_on:
      - mongo

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/hoteldb

  booking:
    build:
      context: ./booking
    restart: always

    depends_on:
      - mongo

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/hoteldb

  search:
    build:
      context: ./search
    restart: always

    depends_on:
      - mongo

    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/hoteldb


  mongo:
    image: mongo:8
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hoteldb
    volumes:
      - mongo-data:/data/db



  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - search
      - auth
      - booking

volumes:
  mongo-data: